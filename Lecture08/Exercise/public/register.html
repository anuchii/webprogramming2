<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Messenger</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Register</h1>

  <section>
    <input id="reg-name" placeholder="Name" /><br/>
    <input id="reg-email" placeholder="Email" /><br/>
    <input id="reg-password" type="password" placeholder="Password" /><br/>
    <input id="reg-group" placeholder="Group ID" value="1" /><br/>
    <button id="reg-btn">Register</button>
    <p id="reg-status"></p>
    <p>Already have an account? <a href="index.html">Login</a></p>
  </section>

  <script type="module" src="../dist/register.js"></script>
</body>
</html>
