<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Messenger</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Login</h1>

  <section>
    <input id="login-email" placeholder="Email or Username" /><br/>

    <button id="btn-login">Login</button>
    <p id="login-status"></p>
    <p>No account yet? <a href="register.html">Register</a></p>
  </section>

  <script type="module" src="../dist/login.js"></script>
</body>
</html>
