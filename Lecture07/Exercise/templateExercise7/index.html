<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1 class="text-center my-4">Memory Game</h1>
        <div class="row justify-content-center my-4">
            <div class="container">
                <div class="text-center my-2">
                    <!-- Spieler Anzeige -->
                    <div class="text-center my-2">
                        <h4 id="player-display">Spieler 1 ist dran!</h4>
                        <div id="scoreboard" class="d-flex justify-content-center gap-4">
                            <span id="score-player1">Spieler 1: 0</span>
                            <span id="score-player2">Spieler 2: 0</span>
                        </div>
                    </div>

                    <div class="d-flex justify-content-center gap-2 my-3">
                        <div id="level-selector">
                            <button>Level 1</button>
                            <button>Level 2</button>
                            <button>Level 3</button>
                            <button>Level 4</button>
                            <button>Level 5</button>
                        </div>
                        <button id="restart-btn">Restart</button>
                    </div>
                </div>
            </div>
            <div id="game-board" class="row justify-content-center">

            </div>
            <div id="score-board" class="row justify-content-center my-4"></div>
        </div>
        <script type="module" src="dist/app.js"></script>

    </div>
</body>

</html>
